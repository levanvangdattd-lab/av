<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Từ Vựng Tiếng Anh - Trắc Nghiệm</title>
<style>
  :root{
    --bg-1:#0f1320;--bg-2:#161b2e;--card-bg:#1c2238;--card-bg-2:#222a45;
    --accent:#5ee0c0;--accent-2:#8b7df0;--accent-warm:#f0a857;
    --text-main:#eef1fb;--text-dim:#9aa3c4;
    --correct:#3ddc97;--correct-bg:#163a2d;--wrong:#ff5c7a;--wrong-bg:#3a1622;
    --radius-lg:22px;--radius-md:16px;--radius-sm:10px;
    --shadow-soft:0 18px 40px -18px rgba(0,0,0,0.55);
    --tag-v:#e8534a;--tag-v-bg:rgba(232,83,74,0.15);
    --tag-n:#4a9de8;--tag-n-bg:rgba(74,157,232,0.15);
    --tag-adj:#e8a84a;--tag-adj-bg:rgba(232,168,74,0.15);
    --tag-adv:#4ae87a;--tag-adv-bg:rgba(74,232,122,0.15);
    --tag-phrase:#c07cf0;--tag-phrase-bg:rgba(192,124,240,0.15);
    --tag-pron:#f06090;--tag-pron-bg:rgba(240,96,144,0.15);
    --tag-prep:#f0c040;--tag-prep-bg:rgba(240,192,64,0.15);
    --tag-conj:#40d0f0;--tag-conj-bg:rgba(64,208,240,0.15);
    --tag-num:#80e860;--tag-num-bg:rgba(128,232,96,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
    background:
      radial-gradient(circle at 12% 8%,rgba(94,224,192,0.10),transparent 45%),
      radial-gradient(circle at 88% 92%,rgba(139,125,240,0.12),transparent 45%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2));
    color:var(--text-main);display:flex;justify-content:center;
    padding:28px 16px 60px;
  }
  .app{width:100%;max-width:560px;display:flex;flex-direction:column;gap:18px;}
  .app-header{text-align:center;margin-bottom:4px;}
  .app-header h1{font-size:1.5rem;margin:0 0 4px;font-weight:700;}
  .app-header h1 span{color:var(--accent);}
  .app-header p{margin:0;color:var(--text-dim);font-size:0.88rem;}

  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .filter-label{font-size:0.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
  .filter-btns{display:flex;flex-wrap:wrap;gap:6px;}
  .flt-btn{
    padding:5px 12px;border-radius:99px;font-size:0.75rem;font-weight:700;
    border:1.5px solid;cursor:pointer;font-family:inherit;transition:all .18s ease;
    background:transparent;
  }
  .flt-btn[data-type="all"]{border-color:rgba(255,255,255,0.25);color:var(--text-dim);}
  .flt-btn[data-type="all"].active{background:rgba(255,255,255,0.12);color:var(--text-main);border-color:rgba(255,255,255,0.5);}
  .flt-btn[data-type="v"]{border-color:var(--tag-v);color:var(--tag-v);}
  .flt-btn[data-type="v"].active{background:var(--tag-v-bg);}
  .flt-btn[data-type="n"]{border-color:var(--tag-n);color:var(--tag-n);}
  .flt-btn[data-type="n"].active{background:var(--tag-n-bg);}
  .flt-btn[data-type="adj"]{border-color:var(--tag-adj);color:var(--tag-adj);}
  .flt-btn[data-type="adj"].active{background:var(--tag-adj-bg);}
  .flt-btn[data-type="adv"]{border-color:var(--tag-adv);color:var(--tag-adv);}
  .flt-btn[data-type="adv"].active{background:var(--tag-adv-bg);}
  .flt-btn[data-type="phrase"]{border-color:var(--tag-phrase);color:var(--tag-phrase);}
  .flt-btn[data-type="phrase"].active{background:var(--tag-phrase-bg);}
  .flt-btn[data-type="prep"]{border-color:var(--tag-prep);color:var(--tag-prep);}
  .flt-btn[data-type="prep"].active{background:var(--tag-prep-bg);}

  .level-badge{
    display:inline-block;font-size:0.62rem;font-weight:800;padding:2px 7px;
    border-radius:5px;letter-spacing:0.06em;text-transform:uppercase;
    vertical-align:middle;margin-left:6px;
  }
  .lvl-a1{background:rgba(74,232,122,0.2);color:#4ae87a;border:1px solid rgba(74,232,122,0.4);}
  .lvl-a2{background:rgba(94,224,192,0.2);color:#5ee0c0;border:1px solid rgba(94,224,192,0.4);}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .stat-box{background:var(--card-bg);border-radius:var(--radius-md);padding:14px 8px;text-align:center;box-shadow:var(--shadow-soft);border:1px solid rgba(255,255,255,0.05);}
  .stat-box .num{font-size:1.5rem;font-weight:800;line-height:1.1;}
  .stat-box .label{font-size:0.7rem;color:var(--text-dim);margin-top:4px;text-transform:uppercase;letter-spacing:0.04em;}
  .stat-box.total .num{color:var(--text-main);}
  .stat-box.learned .num{color:var(--correct);}
  .stat-box.remaining .num{color:var(--accent-warm);}

  .progress-track{width:100%;height:8px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;}
  .progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));width:0%;transition:width .4s ease;}

  .quiz-card{
    background:linear-gradient(165deg,var(--card-bg-2),var(--card-bg));
    border-radius:var(--radius-lg);padding:30px 24px 26px;
    box-shadow:var(--shadow-soft);border:1px solid rgba(255,255,255,0.06);
    position:relative;overflow:hidden;
  }
  .quiz-card::before{content:"";position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:radial-gradient(circle,rgba(94,224,192,0.18),transparent 70%);pointer-events:none;}

  .question-eyebrow{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
  .question-eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

  .word-type-tag{
    display:inline-block;font-size:0.7rem;font-weight:800;padding:3px 10px;
    border-radius:6px;letter-spacing:0.04em;margin-bottom:10px;
  }
  .wtt-v{background:var(--tag-v-bg);color:var(--tag-v);border:1px solid rgba(232,83,74,0.3);}
  .wtt-n{background:var(--tag-n-bg);color:var(--tag-n);border:1px solid rgba(74,157,232,0.3);}
  .wtt-adj{background:var(--tag-adj-bg);color:var(--tag-adj);border:1px solid rgba(232,168,74,0.3);}
  .wtt-adv{background:var(--tag-adv-bg);color:var(--tag-adv);border:1px solid rgba(74,232,122,0.3);}
  .wtt-phrase{background:var(--tag-phrase-bg);color:var(--tag-phrase);border:1px solid rgba(192,124,240,0.3);}
  .wtt-pron{background:var(--tag-pron-bg);color:var(--tag-pron);border:1px solid rgba(240,96,144,0.3);}
  .wtt-prep{background:var(--tag-prep-bg);color:var(--tag-prep);border:1px solid rgba(240,192,64,0.3);}
  .wtt-conj{background:var(--tag-conj-bg);color:var(--tag-conj);border:1px solid rgba(64,208,240,0.3);}
  .wtt-num{background:var(--tag-num-bg);color:var(--tag-num);border:1px solid rgba(128,232,96,0.3);}

  .word-display{text-align:center;margin:4px 0 18px;}
  .word-display .en-word{font-size:2.3rem;font-weight:800;color:var(--text-main);word-break:break-word;line-height:1.2;}
  .word-display .phonetic{margin-top:8px;font-size:1.05rem;color:var(--accent-2);font-style:italic;}

  .speak-wrap{display:flex;justify-content:center;margin-top:12px;}
  .speak-btn{
    display:inline-flex;align-items:center;gap:8px;padding:9px 20px;border-radius:99px;
    border:1.5px solid rgba(94,224,192,0.35);background:rgba(94,224,192,0.08);
    color:var(--accent);font-size:0.88rem;font-weight:600;cursor:pointer;font-family:inherit;
    transition:all .2s ease;letter-spacing:0.02em;
  }
  .speak-btn:hover{background:rgba(94,224,192,0.16);border-color:rgba(94,224,192,0.6);}
  .speak-btn:active{transform:scale(0.96);}
  .speak-btn svg{width:16px;height:16px;flex-shrink:0;transition:transform .15s ease;}
  .speak-btn.speaking{color:var(--accent-warm);border-color:rgba(240,168,87,0.5);background:rgba(240,168,87,0.1);}
  .speak-btn.speaking svg{animation:pulse-icon 0.7s ease-in-out infinite alternate;}
  @keyframes pulse-icon{from{transform:scale(1);}to{transform:scale(1.25);}}

  .speed-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
  .speed-label{font-size:0.75rem;color:var(--text-dim);letter-spacing:0.04em;}
  .speed-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--text-main);font-size:0.8rem;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;outline:none;}
  .speed-select:focus{border-color:rgba(94,224,192,0.5);}

  .options{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
  .option-btn{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    padding:14px 16px;border-radius:var(--radius-sm);
    border:1.5px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);
    color:var(--text-main);font-size:0.98rem;cursor:pointer;
    transition:transform .15s ease,background .2s ease,border-color .2s ease;font-family:inherit;
  }
  .option-btn:hover:not(:disabled){background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18);transform:translateY(-1px);}
  .option-btn:active:not(:disabled){transform:translateY(0) scale(0.99);}
  .option-btn:disabled{cursor:default;}
  .option-btn .letter{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:var(--text-dim);}
  .option-btn.correct{background:var(--correct-bg);border-color:var(--correct);color:#d8ffe9;}
  .option-btn.correct .letter{background:var(--correct);color:#0c2a1c;}
  .option-btn.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:#ffd9e1;}
  .option-btn.wrong .letter{background:var(--wrong);color:#330712;}

  .feedback-row{margin-top:18px;min-height:28px;text-align:center;font-weight:700;font-size:0.95rem;opacity:0;transition:opacity .25s ease;}
  .feedback-row.show{opacity:1;}
  .feedback-row.is-correct{color:var(--correct);}
  .feedback-row.is-wrong{color:var(--wrong);}

  .next-btn{margin-top:14px;width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#0e1326;font-weight:800;font-size:1rem;cursor:pointer;display:none;box-shadow:0 12px 24px -10px rgba(94,224,192,0.45);font-family:inherit;}
  .next-btn:hover{filter:brightness(1.05);}
  .next-btn.show{display:block;}

  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:14px 16px;background:var(--card-bg);border-radius:var(--radius-md);border:1px solid rgba(255,255,255,0.05);}
  .legend-title{width:100%;font-size:0.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
  .leg-item{display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;color:var(--text-dim);}
  .leg-tag{font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:5px;}

  .footer-actions{display:flex;justify-content:center;}
  .reset-btn{background:none;border:1px solid rgba(255,255,255,0.12);color:var(--text-dim);padding:10px 18px;border-radius:99px;font-size:0.85rem;cursor:pointer;font-family:inherit;transition:all .2s ease;}
  .reset-btn:hover{color:var(--wrong);border-color:var(--wrong);background:rgba(255,92,122,0.06);}

  .complete-card{text-align:center;padding:50px 20px;}
  .complete-card .emoji{font-size:3rem;margin-bottom:10px;}
  .complete-card h2{margin:0 0 8px;font-size:1.4rem;}
  .complete-card p{color:var(--text-dim);margin:0 0 20px;}

  .empty-filter{text-align:center;padding:40px 20px;color:var(--text-dim);}
  .empty-filter p{margin:0 0 8px;font-size:1.1rem;}

  @media(max-width:380px){
    .word-display .en-word{font-size:1.9rem;}
    .quiz-card{padding:24px 16px 20px;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>📚 Học Từ Vựng <span>Tiếng Anh</span></h1>
    <p>Chọn đáp án đúng để đánh dấu từ đã học</p>
  </div>

  <nav class="main-nav" style="text-align:center;margin-bottom:8px;">
    <a href="nguphap.html" style="color:var(--accent);font-weight:700;text-decoration:none;margin-right:12px;">Ngữ pháp</a>

  <div class="filter-bar">
    <span class="filter-label">Lọc:</span>
    <div class="filter-btns" id="filterBtns">
      <button class="flt-btn active" data-type="all">Tất cả</button>
      <button class="flt-btn" data-type="v">v. Động từ</button>
      <button class="flt-btn" data-type="n">n. Danh từ</button>
      <button class="flt-btn" data-type="adj">adj. Tính từ</button>
      <button class="flt-btn" data-type="adv">adv. Trạng từ</button>
      <button class="flt-btn" data-type="phrase">phrase. Cụm từ</button>
      <button class="flt-btn" data-type="prep">prep. Giới từ</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box total"><div class="num" id="statTotal">0</div><div class="label">Trong bộ lọc</div></div>
    <div class="stat-box learned"><div class="num" id="statLearned">0</div><div class="label">Đã học</div></div>
    <div class="stat-box remaining"><div class="num" id="statRemaining">0</div><div class="label">Chưa học</div></div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div id="quizArea"></div>

  <div class="legend">
    <div class="legend-title">Ký hiệu từ loại</div>
    <span class="leg-item"><span class="leg-tag wtt-v">v.</span> Động từ</span>
    <span class="leg-item"><span class="leg-tag wtt-n">n.</span> Danh từ</span>
    <span class="leg-item"><span class="leg-tag wtt-adj">adj.</span> Tính từ</span>
    <span class="leg-item"><span class="leg-tag wtt-adv">adv.</span> Trạng từ</span>
    <span class="leg-item"><span class="leg-tag wtt-phrase">phrase.</span> Cụm từ</span>
    <span class="leg-item"><span class="leg-tag wtt-prep">prep.</span> Giới từ</span>
    <span class="leg-item"><span class="leg-tag wtt-pron">pron.</span> Đại từ</span>
    <span class="leg-item"><span class="leg-tag wtt-conj">conj.</span> Liên từ</span>
    <span class="leg-item"><span class="leg-tag wtt-num">num.</span> Số từ</span>
    <span class="leg-item"><span class="level-badge lvl-a1">A1</span> Cơ bản</span>
    <span class="leg-item"><span class="level-badge lvl-a2">A2</span> Sơ cấp</span>
  </div>

  <div class="footer-actions">
    <button class="reset-btn" id="resetBtn">↺ Làm lại từ đầu</button>
  </div>
</div>

<script>

{"word":"brave","phonetic":"b-rây-v","meaning":"dũng cảm","type":"adj","level":"a2"},
{"word":"polite","phonetic":"pơ-lai-t","meaning":"lịch sự","type":"adj","level":"a2"},

(function(){
"use strict";
var STORAGE_KEY="vocab_quiz_learned_v2";
var ttsSupported=('speechSynthesis' in window);
var currentUtterance=null;

var currentFilter="all";
var speakSpeed=0.85;

function loadLearned(){try{var r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveLearned(arr){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(arr));}catch(e){}}

var learnedWords=loadLearned();
var currentWord=null;
var answered=false;

var quizArea=document.getElementById("quizArea");
var statTotal=document.getElementById("statTotal");
var statLearned=document.getElementById("statLearned");
var statRemaining=document.getElementById("statRemaining");

var resetBtn=document.getElementById("resetBtn");

var TYPE_META={
  v:{label:"v.",cls:"wtt-v",full:"Động từ"},
  n:{label:"n.",cls:"wtt-n",full:"Danh từ"},
  adj:{label:"adj.",cls:"wtt-adj",full:"Tính từ"},
  adv:{label:"adv.",cls:"wtt-adv",full:"Trạng từ"},
  phrase:{label:"phrase.",cls:"wtt-phrase",full:"Cụm từ"},
  pron:{label:"pron.",cls:"wtt-pron",full:"Đại từ"},
  prep:{label:"prep.",cls:"wtt-prep",full:"Giới từ"},
  conj:{label:"conj.",cls:"wtt-conj",full:"Liên từ"},
  num:{label:"num.",cls:"wtt-num",full:"Số từ"}
};

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function getFiltered(){
  if(currentFilter==="all") return VOCAB_DATA;
  return VOCAB_DATA.filter(function(item){return item.type===currentFilter;});
}
function getUnlearned(){
  var filtered=getFiltered();
  return filtered.filter(function(item){return learnedWords.indexOf(item.word)===-1;});
}

function updateStats(){
  var filtered=getFiltered();
  var total=filtered.length;
  var learnedCount=filtered.filter(function(item){return learnedWords.indexOf(item.word)!==-1;}).length;
  statTotal.textContent=total;
  statLearned.textContent=learnedCount;
  statRemaining.textContent=total-learnedCount;
  progressFill.style.width=(total===0?0:Math.round((learnedCount/total)*100))+"%";
}

function buildOptions(correctItem){
  var pool=VOCAB_DATA.filter(function(item){return item.word!==correctItem.word;});
  var wrong=shuffle(pool).slice(0,3);
  var opts=wrong.map(function(item){return{meaning:item.meaning,isCorrect:false};});
  opts.push({meaning:correctItem.meaning,isCorrect:true});
  return shuffle(opts);
}

function escHtml(str){var d=document.createElement('div');d.textContent=str;return d.innerHTML;}

function typeBadge(type){
  var m=TYPE_META[type]||{label:type+".",cls:"wtt-n",full:type};
  return '<span class="word-type-tag '+m.cls+'">'+m.label+' '+m.full+'</span>';
}
function levelBadge(level){
  var cls=level==='a2'?'lvl-a2':'lvl-a1';
  return '<span class="level-badge '+cls+'">'+level.toUpperCase()+'</span>';
}

function speakWord(word,btn){
  if(!ttsSupported) return;
  window.speechSynthesis.cancel();
  if(isSpeaking&&currentUtterance&&currentUtterance._word===word){isSpeaking=false;if(btn)btn.classList.remove('speaking');return;}
  var utter=new SpeechSynthesisUtterance(word);
  utter._word=word;utter.lang='en-US';utter.rate=speakSpeed;utter.pitch=1;
  var voices=window.speechSynthesis.getVoices();
  var v=voices.find(function(v){return v.lang.indexOf('en')===0&&v.name.indexOf('Google')===-1;})||voices.find(function(v){return v.lang.indexOf('en')===0;});
  if(v) utter.voice=v;
  utter.onstart=function(){isSpeaking=true;if(btn)btn.classList.add('speaking');};
  utter.onend=function(){isSpeaking=false;if(btn)btn.classList.remove('speaking');};
  utter.onerror=function(){isSpeaking=false;if(btn)btn.classList.remove('speaking');};
  currentUtterance=utter;
  window.speechSynthesis.speak(utter);
}

function renderComplete(){
  quizArea.innerHTML='<div class="quiz-card complete-card"><div class="emoji">🎉</div><h2>Chúc mừng bạn!</h2><p>Bạn đã học xong toàn bộ từ trong bộ lọc hiện tại!</p></div>';
}

function renderEmpty(){
  quizArea.innerHTML='<div class="quiz-card empty-filter"><p>Bộ lọc này chưa có từ nào!</p></div>';
}

function renderQuestion(){
  var unlearned=getUnlearned();
  if(getFiltered().length===0){renderEmpty();return;}
  if(unlearned.length===0){renderComplete();return;}
  currentWord=unlearned[Math.floor(Math.random()*unlearned.length)];
  answered=false;
  var options=buildOptions(currentWord);
  var letters=["A","B","C","D"];
  var speedHtml='<option value="0.6">Chậm</option><option value="0.85" selected>Bình thường</option><option value="1.1">Nhanh</option>';

  var html='<div class="quiz-card">';
  html+='<div class="question-eyebrow"><span class="dot"></span>Chọn nghĩa đúng của từ</div>';
  html+='<div style="text-align:center;">'+typeBadge(currentWord.type)+levelBadge(currentWord.level)+'</div>';
  html+='<div class="word-display"><div class="en-word">'+escHtml(currentWord.word)+'</div>';
  html+='<div class="phonetic">/ '+escHtml(currentWord.phonetic)+' /</div></div>';

  if(ttsSupported){
    html+='<div class="speak-wrap"><button type="button" class="speak-btn" id="speakBtn">';
    html+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>';
    html+='Nghe phát âm</button></div>';
    html+='<div class="speed-wrap"><span class="speed-label">Tốc độ:</span><select class="speed-select" id="speedSelect">'+speedHtml+'</select></div>';
  }

  html+='<div class="options" id="optionsWrap">';
  options.forEach(function(opt,idx){
    html+='<button type="button" class="option-btn" data-correct="'+opt.isCorrect+'"><span class="letter">'+letters[idx]+'</span><span>'+escHtml(opt.meaning)+'</span></button>';
  });
  html+='</div>';
  html+='<div class="feedback-row" id="feedbackRow"></div>';
  html+='<button type="button" class="next-btn" id="nextBtn">Câu tiếp theo →</button>';
  html+='</div>';

  quizArea.innerHTML=html;

  var speakBtn=document.getElementById('speakBtn');
  if(speakBtn){
    speakBtn.addEventListener('click',function(){speakWord(currentWord.word,speakBtn);});
    setTimeout(function(){speakWord(currentWord.word,speakBtn);},300);
  }
  var speedSel=document.getElementById('speedSelect');
  if(speedSel) speedSel.addEventListener('change',function(){speakSpeed=parseFloat(this.value);});

  var optBtns=quizArea.querySelectorAll('.option-btn');
  optBtns.forEach(function(btn){btn.addEventListener('click',function(){handleAnswer(btn,optBtns);});});

  document.getElementById('nextBtn').addEventListener('click',function(){
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    isSpeaking=false;
    renderQuestion();window.scrollTo({top:0,behavior:'smooth'});
  });
}

function handleAnswer(clicked,all){
  if(answered) return;
  answered=true;
  var isCorrect=clicked.getAttribute('data-correct')==='true';
  all.forEach(function(btn){btn.disabled=true;if(btn.getAttribute('data-correct')==='true') btn.classList.add('correct');});
  if(!isCorrect) clicked.classList.add('wrong');
  var fr=document.getElementById('feedbackRow');
  var nb=document.getElementById('nextBtn');
  if(isCorrect){
    fr.textContent='✓ Chính xác! Bạn đã học từ này.';fr.classList.add('show','is-correct');
    if(learnedWords.indexOf(currentWord.word)===-1){learnedWords.push(currentWord.word);saveLearned(learnedWords);}
  } else {
    fr.textContent='✗ Sai rồi! Đáp án đúng là: '+currentWord.meaning;fr.classList.add('show','is-wrong');
    var sb=document.getElementById('speakBtn');
    if(sb) setTimeout(function(){speakWord(currentWord.word,sb);},600);
  }
  updateStats();nb.classList.add('show');
}

document.getElementById('filterBtns').addEventListener('click',function(e){
  var btn=e.target.closest('.flt-btn');
  if(!btn) return;
  document.querySelectorAll('.flt-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  currentFilter=btn.getAttribute('data-type');
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  isSpeaking=false;
  updateStats();renderQuestion();window.scrollTo({top:0,behavior:'smooth'});
});

resetBtn.addEventListener('click',function(){
  if(!window.confirm('Xoá toàn bộ tiến độ và làm lại từ đầu?')) return;
  learnedWords=[];saveLearned(learnedWords);updateStats();renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
});

if(ttsSupported){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
}

updateStats();renderQuestion();
})();

</script>
</body>
</html>
