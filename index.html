<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Từ Vựng Tiếng Anh A2 – Đầy Đủ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #20243a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent2: #f7a84f;
    --accent3: #4fcf8e;
    --text: #e8eaf6;
    --muted: #7a80a0;
    --ipa: #a78bfa;
    --boi: #f9a8d4;
    --viet: #6ee7b7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky; top: 0; z-index: 100;
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }

  h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  h1 span { color: var(--accent2); }

  .stats { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .controls {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center;
  }

  input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: inherit;
    width: 220px;
    outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .speed-control {
    display: flex; align-items: center; gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .speed-control select {
    background: transparent;
    border: none;
    color: var(--accent2);
    font-size: 0.78rem;
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }
  .speed-control select option { background: var(--card); color: var(--text); }

  .tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  main { padding: 20px 16px 40px; max-width: 1200px; margin: 0 auto; }

  .section-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    margin: 24px 0 12px;
    border-left: 3px solid var(--accent2);
    padding-left: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 12px;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    position: relative;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 4px 20px rgba(79,142,247,.12);
  }
  .card.speaking {
    border-color: var(--accent3);
    box-shadow: 0 0 0 2px rgba(79,207,142,.25), 0 4px 20px rgba(79,207,142,.15);
  }

  .word-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    margin-bottom: 4px;
  }

  .word-en {
    font-size: 1.05rem; font-weight: 700; color: var(--text);
    flex: 1;
  }

  /* Speaker button */
  .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 8px;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1;
    transition: color .15s, background .15s, transform .1s;
    flex-shrink: 0;
    margin-top: -2px;
  }
  .speak-btn:hover {
    color: var(--accent3);
    background: rgba(79,207,142,.1);
  }
  .speak-btn:active { transform: scale(.9); }
  .speak-btn.active {
    color: var(--accent3);
    animation: pulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0.55; transform: scale(1.15); }
  }

  /* Play all button */
  .play-all-btn {
    background: rgba(79,207,142,.1);
    border: 1px solid rgba(79,207,142,.3);
    color: var(--accent3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .play-all-btn:hover {
    background: rgba(79,207,142,.2);
    border-color: var(--accent3);
  }
  .play-all-btn.playing {
    background: rgba(247,168,79,.1);
    border-color: rgba(247,168,79,.4);
    color: var(--accent2);
  }

  .word-ipa {
    font-family: 'Fira Code', monospace;
    font-size: 0.78rem; color: var(--ipa);
    margin-bottom: 2px;
  }

  .word-boi {
    font-size: 0.78rem; color: var(--boi);
    margin-bottom: 6px;
    font-style: italic;
  }

  .word-viet {
    font-size: 0.88rem; color: var(--viet);
    font-weight: 600;
  }

  .word-ex {
    font-size: 0.75rem; color: var(--muted);
    margin-top: 6px;
    line-height: 1.4;
    border-top: 1px solid var(--border);
    padding-top: 6px;
    display: flex; align-items: flex-start; gap: 6px;
  }

  .ex-speak {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: var(--muted);
    font-size: 0.75rem;
    line-height: 1.4;
    flex-shrink: 0;
    transition: color .15s;
    margin-top: 1px;
  }
  .ex-speak:hover { color: var(--accent); }
  .ex-speak.active {
    color: var(--accent);
    animation: pulse 0.7s ease-in-out infinite alternate;
  }

  .ex-block { flex: 1; min-width: 0; }

  .word-ex-vi {
    font-size: 0.73rem;
    color: var(--viet);
    opacity: 0.85;
    margin-top: 2px;
    line-height: 1.4;
    font-style: italic;
  }

  .tag {
    position: absolute; top: 10px; right: 44px;
    font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    padding: 2px 7px; border-radius: 10px;
    background: rgba(79,142,247,.15); color: var(--accent);
  }

  .no-result {
    text-align: center; color: var(--muted);
    padding: 60px 20px; font-size: 0.9rem;
  }

  .count-badge {
    display: inline-block;
    background: rgba(79,207,142,.1);
    color: var(--accent3);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .no-tts-msg {
    font-size: 0.72rem;
    color: var(--accent2);
    background: rgba(247,168,79,.08);
    border: 1px solid rgba(247,168,79,.2);
    border-radius: 8px;
    padding: 6px 12px;
    margin-top: 8px;
    display: none;
  }
  .no-tts-msg.show { display: block; }
</style>
</head>

  </div>
</header>

<main id="main"></main>

// ===== TTS ENGINE =====
const hasTTS = 'speechSynthesis' in window;
let voices = [];
let preferredVoice = null;
let currentUtterance = null;
let activeWordBtn = null;
let activeExBtn = null;
let playAllQueue = [];
let isPlayingAll = false;

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  // Prefer an English (GB or US) voice
  preferredVoice =
    voices.find(v => v.lang === 'en-GB') ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en')) ||
    null;
}

if (hasTTS) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
} else {
  document.getElementById('noTtsMsg').classList.add('show');
}

function getSpeed() {
  return parseFloat(document.getElementById('speedSelect').value);
}

function stopAll() {
  if (hasTTS) window.speechSynthesis.cancel();
  if (activeWordBtn) { activeWordBtn.classList.remove('active'); activeWordBtn.textContent = '🔊'; activeWordBtn = null; }
  if (activeExBtn) { activeExBtn.classList.remove('active'); activeExBtn.textContent = '💬'; activeExBtn = null; }
  document.querySelectorAll('.card.speaking').forEach(c => c.classList.remove('speaking'));
  playAllQueue = [];
  isPlayingAll = false;
  const btn = document.getElementById('playAllBtn');
  btn.textContent = '▶ Phát tất cả';
  btn.classList.remove('playing');
}

function speak(text, onEnd, rate) {
  if (!hasTTS) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-GB';
  utter.rate = rate || getSpeed();
  if (preferredVoice) utter.voice = preferredVoice;
  utter.onend = onEnd || null;
  utter.onerror = onEnd || null;
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

function speakWord(text, btn, card) {
  const isActive = btn.classList.contains('active');
  stopAll();
  if (isActive) return; // toggle off

  btn.classList.add('active');
  btn.textContent = '🔉';
  card.classList.add('speaking');
  activeWordBtn = btn;

  speak(text, () => {
    btn.classList.remove('active');
    btn.textContent = '🔊';
    card.classList.remove('speaking');
    if (activeWordBtn === btn) activeWordBtn = null;
  });
}

function speakExample(text, btn, card) {
  const isActive = btn.classList.contains('active');
  stopAll();
  if (isActive) return;

  btn.classList.add('active');
  btn.textContent = '🔈';
  card.classList.add('speaking');
  activeExBtn = btn;

  speak(text, () => {
    btn.classList.remove('active');
    btn.textContent = '💬';
    card.classList.remove('speaking');
    if (activeExBtn === btn) activeExBtn = null;
  });
}

// ===== PLAY ALL =====
function playNextInQueue() {
  if (playAllQueue.length === 0) {
    stopAll();
    return;
  }
  const { word, ex } = playAllQueue.shift();
  // Find the card
  const cards = document.querySelectorAll('.card');
  let targetCard = null;
  cards.forEach(c => {
    if (c.dataset.word === word) targetCard = c;
  });
  if (targetCard) targetCard.classList.add('speaking');
  const btn = document.getElementById('playAllBtn');
  btn.textContent = `⏹ Dừng (còn ${playAllQueue.length + 1})`;

  // Speak word then example
  speak(word, () => {
    setTimeout(() => {
      speak(ex, () => {
        if (targetCard) targetCard.classList.remove('speaking');
        setTimeout(playNextInQueue, 400);
      });
    }, 300);
  });
}

document.getElementById('playAllBtn').addEventListener('click', () => {
  if (isPlayingAll) { stopAll(); return; }
  const filtered = getFiltered();
  if (!filtered.length || !hasTTS) return;

  stopAll();
  isPlayingAll = true;
  playAllQueue = filtered.map(v => ({ word: v.en, ex: v.ex }));
  const btn = document.getElementById('playAllBtn');
  btn.textContent = `⏹ Dừng (${playAllQueue.length})`;
  btn.classList.add('playing');
  playNextInQueue();
});

// ===== RENDER =====
const allCats = ["Tất Cả", ...new Set(vocab.map(v => v.cat))];
let currentCat = "Tất Cả";
let searchTerm = "";

function getFiltered() {
  return vocab.filter(v => {
    const inCat = currentCat === "Tất Cả" || v.cat === currentCat;
    const q = searchTerm.toLowerCase();
    const match = !q || v.en.toLowerCase().includes(q) || v.vi.toLowerCase().includes(q) || v.boi.toLowerCase().includes(q);
    return inCat && match;
  });
}

function highlight(text) {
  if (!searchTerm) return text;
  const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, "gi");
  return text.replace(re, `<mark style="background:#f7a84f33;color:var(--accent2);border-radius:2px">$1</mark>`);
}

function render() {
  const main = document.getElementById("main");
  const filtered = getFiltered();

  document.getElementById("stats").textContent = `${filtered.length} từ vựng${currentCat !== "Tất Cả" ? " · " + currentCat : ""}`;

  if (!filtered.length) {
    main.innerHTML = `<div class="no-result">Không tìm thấy từ nào 😅</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(v => {
    if (!groups[v.cat]) groups[v.cat] = [];
    groups[v.cat].push(v);
  });

  main.innerHTML = Object.entries(groups).map(([cat, words]) => `
    <div class="section-title">${cat} <span class="count-badge">${words.length}</span></div>
    <div class="grid">
      ${words.map(w => `
        <div class="card" data-word="${w.en.replace(/"/g,'&quot;')}">
          <div class="tag">${w.cat.split(" ")[0]}</div>
          <div class="word-header">
            <div class="word-en">${highlight(w.en)}</div>
            ${hasTTS ? `<button class="speak-btn" title="Nghe phát âm từ" data-word="${w.en.replace(/"/g,'&quot;')}" data-ex="${w.ex.replace(/"/g,'&quot;')}">🔊</button>` : ''}
          </div>
          <div class="word-ipa">${w.ipa}</div>
          <div class="word-boi">📣 ${w.boi}</div>
          <div class="word-viet">🇻🇳 ${w.vi}</div>
          <div class="word-ex">
            ${hasTTS ? `<button class="ex-speak" title="Nghe câu ví dụ" data-ex="${w.ex.replace(/"/g,'&quot;')}">💬</button>` : '<span>💬</span>'}
            <div class="ex-block">
              <span>${w.ex}</span>
              ${w.ex_vi ? `<div class="word-ex-vi">${w.ex_vi}</div>` : ''}
            </div>
          </div>
        </div>
      `).join("")}
    </div>
  `).join("");

  // Attach events
  if (hasTTS) {
    document.querySelectorAll('.speak-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const card = btn.closest('.card');
        speakWord(btn.dataset.word, btn, card);
      });
    });
    document.querySelectorAll('.ex-speak').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const card = btn.closest('.card');
        speakExample(btn.dataset.ex, btn, card);
      });
    });
  }
}

// Build tabs
const tabsEl = document.getElementById("tabs");
allCats.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab" + (cat === "Tất Cả" ? " active" : "");
  btn.textContent = cat === "Tất Cả" ? `🌐 Tất Cả` : cat;
  btn.onclick = () => {
    stopAll();
    currentCat = cat;
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  tabsEl.appendChild(btn);
});

document.getElementById("search").addEventListener("input", e => {
  stopAll();
  searchTerm = e.target.value;
  render();
});

document.getElementById("speedSelect").addEventListener("change", () => {
  stopAll();
});

render();
</script>
